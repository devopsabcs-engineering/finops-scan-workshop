<link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/assets/branding/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/assets/branding/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/assets/branding/apple-touch-icon.png">
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false });
  document.querySelectorAll('pre > code.language-mermaid').forEach(el => {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = el.textContent;
    el.parentElement.replaceWith(div);
  });
  await mermaid.run();
</script>
<style>
  .mermaid { text-align: center; }
  /* Allow long site titles to wrap instead of being clipped */
  @media (min-width: 50rem) {
    .site-header {
      height: auto;
      max-height: none;
    }
  }
</style>

{% if page.lang == 'fr' %}
<style>
  /* Hide English nav items immediately to prevent flash */
  .site-nav .nav-list { visibility: hidden; }
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Point site title to French homepage
  var siteTitle = document.querySelector('.site-title');
  if (siteTitle) {
    siteTitle.href = '{{ site.baseurl }}/fr/';
  }

  // Replace English nav with French nav
  var nav = document.querySelector('.site-nav .nav-list');
  if (nav) {
    var frPages = [
      {% assign fr_pages = site.pages | where: "lang", "fr" | sort: "permalink" %}{% for p in fr_pages %}{ title: {{ p.title | jsonify }}, url: "{{ p.permalink | prepend: site.baseurl }}" },
      {% endfor %}
    ];

    nav.innerHTML = '';
    var currentPath = window.location.pathname.replace(/\/$/,'');
    frPages.forEach(function(p) {
      var li = document.createElement('li');
      li.className = 'nav-list-item';
      var a = document.createElement('a');
      a.href = p.url;
      a.className = 'nav-list-link';
      if (currentPath === p.url.replace(/\/$/,'')) {
        a.classList.add('active');
      }
      a.textContent = p.title;
      li.appendChild(a);
      nav.appendChild(li);
    });
    nav.style.visibility = 'visible';
  }
});
</script>
{% endif %}
